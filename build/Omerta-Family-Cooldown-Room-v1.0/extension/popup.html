<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omerta Family Cooldown Room v1.0</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <h1>Omerta Family Cooldown Room v1.0</h1>
        <p class="subtitle">Simple status and dashboard link</p>
      </header>

      <section class="panel">
        <div class="panel-title">Status</div>
        <div class="status-list">
          <div class="status-row"><span>Connection</span><strong id="statusConnection">Waiting...</strong></div>
          <div class="status-row"><span>Player</span><strong id="statusPlayer">-</strong></div>
          <div class="status-row"><span>Room</span><strong id="statusRoom">TestRoom</strong></div>
          <div class="status-row"><span>Last Update</span><strong id="statusUpdated">-</strong></div>
          <div class="status-row"><span>Cooldowns</span><strong id="statusCooldownsCount">0</strong></div>
          <div class="status-row"><span>Parser Error</span><strong id="statusParserError">-</strong></div>
        </div>
        <div class="locked-room">Room is locked for this build.</div>
        <div class="button-row">
          <button id="sendNowButton" type="button">Send Now</button>
          <button id="openDashboardButton" type="button" class="secondary">Open Dashboard</button>
        </div>
        <div id="settingsFeedback" class="feedback"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
